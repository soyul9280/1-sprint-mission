version: "3.8"

services:
    app:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: discodeit-server
      ports:
        - "8080"
      environment:
        - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
        - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
        - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
        - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
        - JVM_OPTS=${JVM_OPTS}
        - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
        - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
        - AWS_S3_REGION=${AWS_S3_REGION}
        - AWS_S3_BUCKET=${AWS_S3_BUCKET}
        - STORAGE_TYPE=${STORAGE_TYPE}
      volumes:
        - app-storage:/app/discodeFile
      depends_on:
        - my-db

    my-db:
      image: postgres:17
      container_name: discodeit-db
      environment:
        - POSTGRES_DB=discodeit_dev
        - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME}
        - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      ports:
        - "5433:5432"
      volumes:
        - db-data:/var/lib/postgresql/data
        - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql


    redis:
      image: redis:7
      container_name: discodeit-redis

    kafka:
      image: bitnami/kafka:latest
      container_name: discodeit-kafka
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: discodeit-zookeeper:2181
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://discodeit-kafka:9092
        ALLOW_PLAINTEXT_LISTENER: "yes"
      depends_on:
        - zookeeper

    zookeeper:
      image: bitnami/zookepper:latest
      container_name: discodeit-zookepper
      environment:
        ALLOW_ANONYMOUS_LOGIN: "yes"

    nginx:
      build:
        context: .
        dockerfile: nginx/Dockerfile
      container_name: discodeit-nginx
      ports:
        - "3000:3000"
      depends_on:
        - app
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf


volumes:
  db-data:
  app-storage:
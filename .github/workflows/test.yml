name: CI workflow

on:
  pull_request:
    branches:
      - main

jobs:
  test: #test이름의 job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source # 현재 작업중인 저장소 가져와서 기반 코드를 Runner환경에 다운로드
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoReport.xml
